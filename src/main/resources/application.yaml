server:
  port: 3000

spring:
  application:
    name: keycap_server
  datasource:
    url: "jdbc:mysql://localhost:3306/keycap_server?createDatabaseIfNotExist=true"
    driverClassName: "com.mysql.cj.jdbc.Driver"
    username: root
    password: ${DB_PASSWORD}

  # Redis Config
  data:
    redis:
      host: localhost
      port: 6379
    # RabbitMQ Config
    rabbitmq:
      host: localhost
      port: 5672
      username: guest
      password: guest

  # Mail Config (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
  cloud:
    openfeign:
      client:
        config:
          momo-client:
            connect-timeout: 10000
            read-timeout: 30000

jwt:
  signerKey: ${JWT_SIGNER_KEY}

google:
  oauth2:
    project-id: ${GOOGLE_PROJECT_ID}
    auth-url: ${GOOGLE_AUTH_URL}
    token-uri: ${GOOGLE_TOKEN_URI}
    auth-provider-x509-cert-url: ${GOOGLE_AUTH_PROVIDER_CERT_URL}
    javascript-origins: ${GOOGLE_JAVASCRIPT_ORIGINS}

momo:
  partner-code: ${MOMO_PARTNER_CODE}
  access-key: ${MOMO_ACCESS_KEY}
  secret-key: ${MOMO_SECRET_KEY}
  api-url: ${MOMO_API_URL}
  redirect-url: ${MOMO_REDIRECT_URL}
  ipn-url: ${MOMO_IPN_URL}

vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  api-url: ${VNPAY_API_URL}
  redirect-url: ${VNPAY_REDIRECT_URL}

shipping:
  ghn:
    token: ${GHN_TOKEN}
    shop-id: ${GHN_SHOP_ID}
    api-url: ${GHN_API_URL}
    from-district-id: ${GHN_FROM_DISTRICT_ID}
    from-ward-code: ${GHN_FROM_WARD_CODE}

order:
  payment:
    expiry-minutes: 15
