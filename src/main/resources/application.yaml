spring:
  server:
    port: 8080
  application:
    name: keycap_server
  datasource:
    url: "jdbc:mysql://localhost:3306/keycap_server?createDatabaseIfNotExist=true"
    driverClassName: "com.mysql.cj.jdbc.Driver"
    username: root
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  signerKey: ${JWT_SIGNER_KEY}
